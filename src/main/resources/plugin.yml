name: EMCShop
version: '2.8-SNAPSHOT'
main: top.MiragEdge.emc.EMCShop
api-version: '1.21'
prefix: EMCShop
authors: [ FwindEmi ]
description: EMC Shop Plugin for MiragEdge NetWork
website: miragedge.top

commands:
  emcshop:
    description: "EMC商店主命令"
    usage: /emcshop

permissions:
  emcshop.admin.give:
    description: 允许给予EMC
    default: op
  emcshop.admin.reload:
    description: 允许重载插件
    default: op
  emcshop.user:
    description: 基础用户权限
    default: true