# config.yml

##########################################
#  EMCShop-MiragEdge - 狐风轩汐#FwindEmi  #
#            等价交换 锐界幻境             #
#########################################

# 重构损耗率，1表示100%
purchase:
  reconstruction-loss: 0.038

# 数据库配置
database:
  host: localhost
  port: 3306
  database: emcshop
  username: root
  password: ''

  # 连接池
  pool:
    max-size: 8
    min-idle: 2
    connection-timeout: 10000
    idle-timeout: 300000
    max-lifetime: 900000 # 15分钟
    leak-detection-threshold: 15000 # 15秒泄漏检测
    validation-timeout: 3000

  # 数据存储队列
  queue:
    batch-size: 100      # 每次处理的最大任务数
    process-interval: 50 # 队列处理间隔(ms)
    save-delay: 10       # 保存操作延迟(ticks)